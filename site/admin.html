<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Comments — Admin</title>
  <style>
    :root {
      --red: #E3201A; --red-deep: #B5160F;
      --navy: #0E2746; --navy-2: #15355c;
      --paper: #f4f1ea; --card: #ffffff;
      --ink: #16181d; --ink-muted: #5b616b; --hairline: #e4e0d6;
      --green: #1c8a3b; --green-bg: #e3f3e7;
      --amber: #b97e00; --amber-bg: #fcf1d9;
      --gray: #6b7280; --gray-bg: #eceef1;
      --shadow: 0 1px 2px rgba(16,24,40,.06), 0 8px 24px rgba(16,24,40,.06);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: 'Barlow', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--ink); background: #eef0f3;
      -webkit-font-smoothing: antialiased;
    }
    /* ---- header ---- */
    header {
      position: sticky; top: 0; z-index: 20;
      background: var(--navy); color: #fff;
      border-bottom: 3px solid var(--red);
      padding: 14px 22px;
      display: flex; align-items: center; gap: 14px;
    }
    header h1 {
      margin: 0; font-size: 18px; font-weight: 700;
      letter-spacing: .4px; text-transform: uppercase;
      display: flex; align-items: center; gap: 9px;
    }
    header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--red); }
    header .meta { color: #9db8de; font-size: 12.5px; }
    header .spacer { flex: 1; }
    /* ---- buttons ---- */
    button { font: inherit; cursor: pointer; border: 0; border-radius: 8px; }
    .btn {
      padding: 8px 14px; font-size: 13.5px; font-weight: 600;
      background: var(--red); color: #fff; transition: background .15s;
    }
    .btn:hover { background: var(--red-deep); }
    .btn--ghost {
      background: rgba(255,255,255,.10); color: #fff;
      border: 1px solid rgba(255,255,255,.28);
    }
    .btn--ghost:hover { background: rgba(255,255,255,.20); }
    .btn--soft {
      background: #fff; color: var(--navy); border: 1px solid var(--hairline);
      box-shadow: var(--shadow);
    }
    .btn--soft:hover { border-color: #c9cdd4; }
    /* ---- layout ---- */
    main { max-width: 1180px; margin: 0 auto; padding: 22px; }
    .muted { color: var(--ink-muted); font-size: 13px; }
    .err { color: var(--red); font-weight: 600; }

    /* ---- gate ---- */
    .gate {
      max-width: 400px; margin: 70px auto; background: var(--card);
      border: 1px solid var(--hairline); border-radius: 14px;
      padding: 28px; box-shadow: var(--shadow);
    }
    .gate h2 { margin: 0 0 4px; font-size: 19px; }
    label.fld { display: block; font-size: 13px; font-weight: 600; margin: 16px 0 6px; }
    input[type=password], input[type=text] {
      width: 100%; padding: 10px 12px; font-size: 15px;
      border: 1px solid var(--hairline); border-radius: 9px; background: #fbfaf7;
    }
    input:focus { outline: 2px solid var(--navy-2); border-color: var(--navy-2); }

    /* ---- toolbar ---- */
    .toolbar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 12px; border-radius: 999px; font-size: 12.5px; font-weight: 600;
      background: #fff; border: 1px solid var(--hairline); box-shadow: var(--shadow);
    }
    .chip b { font-weight: 800; }
    .chip .swatch { width: 9px; height: 9px; border-radius: 50%; }
    .sw-public { background: var(--green); }
    .sw-review { background: var(--amber); }
    .sw-private { background: var(--gray); }
    .grow { flex: 1; }
    .search { max-width: 280px; }
    .search input { padding: 8px 12px; box-shadow: var(--shadow); }

    /* ---- table card ---- */
    .tablewrap {
      background: var(--card); border: 1px solid var(--hairline);
      border-radius: 14px; box-shadow: var(--shadow); overflow: hidden;
    }
    .scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead th {
      position: sticky; top: 59px; z-index: 5;
      background: #faf9f6; text-align: left; padding: 12px 14px;
      font-size: 11.5px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
      color: var(--ink-muted); border-bottom: 1px solid var(--hairline); white-space: nowrap;
    }
    tbody td { padding: 13px 14px; vertical-align: top; border-bottom: 1px solid #f0ede6; }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: #faf9f5; }
    td.nowrap { white-space: nowrap; }
    td.id { color: var(--ink-muted); font-variant-numeric: tabular-nums; }
    td.comment { min-width: 280px; max-width: 420px; line-height: 1.45; }
    td.email a { color: var(--navy-2); text-decoration: none; }
    td.email a:hover { text-decoration: underline; }
    .pill {
      display: inline-block; padding: 2px 9px; border-radius: 999px;
      font-size: 11.5px; font-weight: 700;
    }
    .pill.yes { background: var(--green-bg); color: var(--green); }
    .pill.no { background: var(--gray-bg); color: var(--gray); }

    /* ---- segmented visibility toggle ---- */
    .seg {
      display: inline-flex; padding: 3px; gap: 2px;
      background: #eceef1; border-radius: 9px; border: 1px solid var(--hairline);
    }
    .seg button {
      border: 0; background: transparent; border-radius: 7px;
      padding: 5px 10px; font-size: 12px; font-weight: 600; color: var(--ink-muted);
      white-space: nowrap; transition: background .12s, color .12s;
    }
    .seg button:hover { color: var(--ink); }
    .seg button[aria-pressed="true"] { color: #fff; box-shadow: var(--shadow); }
    .seg button.v-private[aria-pressed="true"] { background: var(--gray); }
    .seg button.v-review[aria-pressed="true"]  { background: var(--amber); }
    .seg button.v-public[aria-pressed="true"]  { background: var(--green); }
    .seg.saving { opacity: .55; pointer-events: none; }

    .empty { padding: 48px; text-align: center; color: var(--ink-muted); }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: #fff; padding: 10px 16px; border-radius: 10px;
      font-size: 13.5px; box-shadow: 0 10px 30px rgba(0,0,0,.3); opacity: 0;
      transition: opacity .2s, transform .2s; pointer-events: none; z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    .toast.err { background: var(--red-deep); }
  </style>
</head>
<body>
  <header>
    <h1><span class="dot"></span> Comments</h1>
    <span class="meta" id="headerMeta"></span>
    <span class="spacer"></span>
    <button class="btn--ghost btn" id="lockBtn" hidden>Lock</button>
  </header>

  <main>
    <!-- Token gate -->
    <section id="gate" class="gate" hidden>
      <h2>Admin access</h2>
      <p class="muted" style="margin:4px 0 0">Enter the admin token to view and manage submissions.</p>
      <label class="fld" for="token">Admin token</label>
      <input type="password" id="token" autocomplete="off" placeholder="Paste token…" />
      <button class="btn" id="gateBtn" style="margin-top:16px; width:100%">View comments</button>
      <p class="err" id="gateErr" style="margin:12px 0 0"></p>
    </section>

    <!-- Data view -->
    <section id="view" hidden>
      <div class="toolbar">
        <div class="chips" id="chips"></div>
        <span class="grow"></span>
        <div class="search"><input type="text" id="search" placeholder="Filter name, email, comment…" /></div>
        <button class="btn--soft btn" id="refreshBtn">Refresh</button>
        <button class="btn--soft btn" id="csvBtn">Export CSV</button>
      </div>

      <div class="tablewrap">
        <div class="scroll">
          <table>
            <thead>
              <tr>
                <th>#</th><th>Date</th><th>Name</th><th>Address</th>
                <th>Email</th><th>D3</th><th>Comment</th><th>Visibility</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="empty" id="empty" hidden>No comments match.</div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    (function () {
      'use strict';
      var KEY = 'pp_admin_token';
      var VIS = [
        { v: 'private',   label: 'Private',   cls: 'v-private' },
        { v: 'to-review', label: 'To review', cls: 'v-review' },
        { v: 'public',    label: 'Public',    cls: 'v-public' }
      ];
      var rows = [];

      var el = function (id) { return document.getElementById(id); };
      var els = {
        gate: el('gate'), view: el('view'), token: el('token'),
        gateBtn: el('gateBtn'), gateErr: el('gateErr'),
        chips: el('chips'), tbody: el('tbody'), empty: el('empty'),
        headerMeta: el('headerMeta'), lockBtn: el('lockBtn'),
        refreshBtn: el('refreshBtn'), csvBtn: el('csvBtn'),
        search: el('search'), toast: el('toast')
      };

      function getToken() { return sessionStorage.getItem(KEY) || ''; }
      function setToken(t) { sessionStorage.setItem(KEY, t); }
      function clearToken() { sessionStorage.removeItem(KEY); }

      function fmtDate(iso) {
        var d = new Date(iso);
        if (isNaN(d)) return iso || '';
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
          ', ' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
      }

      var toastTimer;
      function toast(msg, isErr) {
        els.toast.textContent = msg;
        els.toast.className = 'toast show' + (isErr ? ' err' : '');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { els.toast.className = 'toast'; }, 2400);
      }

      function showGate(msg) {
        els.view.hidden = true; els.lockBtn.hidden = true;
        els.gate.hidden = false; els.headerMeta.textContent = '';
        els.gateErr.textContent = msg || '';
        els.token.focus();
      }

      function renderChips() {
        var counts = { private: 0, 'to-review': 0, public: 0 };
        rows.forEach(function (r) { if (counts[r.visibility] != null) counts[r.visibility]++; });
        els.chips.innerHTML =
          '<span class="chip"><b>' + rows.length + '</b> total</span>' +
          '<span class="chip"><span class="swatch sw-public"></span><b>' + counts.public + '</b> public</span>' +
          '<span class="chip"><span class="swatch sw-review"></span><b>' + counts['to-review'] + '</b> to review</span>' +
          '<span class="chip"><span class="swatch sw-private"></span><b>' + counts.private + '</b> private</span>';
      }

      function makeSeg(r) {
        var seg = document.createElement('div');
        seg.className = 'seg';
        VIS.forEach(function (o) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = o.cls;
          b.textContent = o.label;
          b.setAttribute('aria-pressed', String(r.visibility === o.v));
          b.addEventListener('click', function () {
            if (r.visibility === o.v) return;
            setVisibility(r, o.v, seg);
          });
          seg.appendChild(b);
        });
        return seg;
      }

      function setVisibility(r, value, seg) {
        var prev = r.visibility;
        seg.classList.add('saving');
        fetch('/api/comments/' + encodeURIComponent(r.id) + '/visibility', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'x-admin-token': getToken() },
          body: JSON.stringify({ visibility: value })
        }).then(function (res) {
          if (res.status === 401) { clearToken(); showGate('Session expired — re-enter token.'); return null; }
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        }).then(function (data) {
          seg.classList.remove('saving');
          if (!data) return;
          r.visibility = data.visibility;
          // reflect new state on the buttons + chips
          Array.prototype.forEach.call(seg.children, function (b, i) {
            b.setAttribute('aria-pressed', String(VIS[i].v === r.visibility));
          });
          renderChips();
          toast('#' + r.id + ' → ' + r.visibility);
        }).catch(function (e) {
          seg.classList.remove('saving');
          r.visibility = prev;
          toast('Failed to update #' + r.id, true);
        });
      }

      function filtered() {
        var q = els.search.value.trim().toLowerCase();
        if (!q) return rows;
        return rows.filter(function (r) {
          return [r.name, r.email, r.address, r.comment].some(function (f) {
            return (f || '').toLowerCase().indexOf(q) !== -1;
          });
        });
      }

      function render() {
        var list = filtered();
        els.tbody.innerHTML = '';
        els.empty.hidden = list.length > 0;

        var frag = document.createDocumentFragment();
        list.forEach(function (r) {
          var tr = document.createElement('tr');
          function td(cls, text) {
            var c = document.createElement('td');
            if (cls) c.className = cls;
            if (text != null) c.textContent = text;
            return c;
          }
          tr.appendChild(td('id nowrap', r.id));
          tr.appendChild(td('nowrap muted', fmtDate(r.created_at)));
          tr.appendChild(td('', r.name || ''));
          tr.appendChild(td('', r.address || ''));

          var em = td('email');
          if (r.email) {
            var a = document.createElement('a');
            a.href = 'mailto:' + r.email; a.textContent = r.email;
            em.appendChild(a);
          }
          tr.appendChild(em);

          var d3 = td('nowrap');
          d3.innerHTML = r.district3 ? '<span class="pill yes">Yes</span>' : '<span class="pill no">No</span>';
          tr.appendChild(d3);

          tr.appendChild(td('comment', r.comment || ''));

          var vis = td('nowrap');
          vis.appendChild(makeSeg(r));
          tr.appendChild(vis);

          frag.appendChild(tr);
        });
        els.tbody.appendChild(frag);
        renderChips();
      }

      function load() {
        var token = getToken();
        if (!token) { showGate(); return; }
        fetch('/api/comments?limit=500', { headers: { 'x-admin-token': token } })
          .then(function (res) {
            if (res.status === 401) { clearToken(); showGate('Invalid token.'); return null; }
            if (res.status === 503) { showGate('Listing disabled (ADMIN_TOKEN not set on the server).'); return null; }
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(function (data) {
            if (!data) return;
            rows = data.comments || [];
            els.gate.hidden = true; els.view.hidden = false; els.lockBtn.hidden = false;
            els.headerMeta.textContent = data.stub ? 'sample data — DB not connected' : '';
            render();
          })
          .catch(function (e) { showGate('Failed to load: ' + e.message); });
      }

      function toCsv() {
        var cols = ['id', 'created_at', 'name', 'address', 'email', 'district3', 'visibility', 'comment'];
        var lines = [cols.join(',')];
        rows.forEach(function (r) {
          lines.push(cols.map(function (c) {
            return '"' + String(r[c] == null ? '' : r[c]).replace(/"/g, '""') + '"';
          }).join(','));
        });
        var blob = new Blob([lines.join('\n')], { type: 'text/csv' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = 'comments.csv'; a.click();
        URL.revokeObjectURL(a.href);
      }

      els.gateBtn.addEventListener('click', function () {
        var t = els.token.value.trim();
        if (!t) { els.gateErr.textContent = 'Token required.'; return; }
        setToken(t); els.token.value = ''; load();
      });
      els.token.addEventListener('keydown', function (e) { if (e.key === 'Enter') els.gateBtn.click(); });
      els.refreshBtn.addEventListener('click', load);
      els.csvBtn.addEventListener('click', toCsv);
      els.search.addEventListener('input', render);
      els.lockBtn.addEventListener('click', function () { clearToken(); rows = []; showGate(); });

      if (getToken()) load(); else showGate();
    })();
  </script>
</body>
</html>
