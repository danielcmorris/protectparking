# Local dev only: brings up Postgres + the API together.
#   docker compose up --build
# The DB is created empty; apply db/schema.sql once it's running.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: vallejo
      POSTGRES_PASSWORD: vallejo
      POSTGRES_DB: vallejo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  api:
    build: .
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://vallejo:vallejo@db:5432/vallejo
      CORS_ORIGINS: "*"
      NODE_ENV: development
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
