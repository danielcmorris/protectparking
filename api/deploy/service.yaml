# Cloud Run service definition (Knative spec) — reflects the live `parking`
# service config. NOTE: production deploys happen via the Cloud Run GitHub
# connector trigger (build-on-push); this file documents the runtime config and
# can re-apply it directly with:
#   gcloud run services replace api/deploy/service.yaml --region us-west1
#
# The DATABASE_URL secret + Cloud SQL attachment were set on the service with:
#   gcloud run services update parking --region=us-west1 \
#     --add-cloudsql-instances=morrisdev-203721:us-central1:morrisdev \
#     --update-secrets=DATABASE_URL=protectparking-database-url:latest
#
# Secret was created from creds/api.env (socket-form connection string):
#   gcloud secrets create protectparking-database-url --data-file=-
#
# The ADMIN_TOKEN secret (guards the /admin.html comment listing) was set with:
#   printf '%s' "$ADMIN_TOKEN" | gcloud secrets create protectparking-admin-token --data-file=-
#   gcloud run services update parking --region=us-west1 \
#     --update-secrets=ADMIN_TOKEN=protectparking-admin-token:latest
#
# The RESEND_API_KEY secret (transactional email via Resend) was set with:
#   KEY=$(grep '^RESEND_API_KEY=' creds/api.env | cut -d= -f2-)
#   printf '%s' "$KEY" | gcloud secrets create protectparking-resend-api-key \
#     --project=morrisdev-203721 --replication-policy=automatic --data-file=-
#   gcloud secrets add-iam-policy-binding protectparking-resend-api-key \
#     --project=morrisdev-203721 \
#     --member=serviceAccount:682935653385-compute@developer.gserviceaccount.com \
#     --role=roles/secretmanager.secretAccessor
#   gcloud run services update parking --region=us-west1 \
#     --update-secrets=RESEND_API_KEY=protectparking-resend-api-key:latest \
#     --update-env-vars=RESEND_FROM=donotreply@protectparking.com
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: parking
  labels:
    app: protectparking
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/startup-cpu-boost: "true"
        # Mounts the Cloud SQL unix socket at /cloudsql/<connection-name>,
        # which the DATABASE_URL connection string points to.
        run.googleapis.com/cloudsql-instances: morrisdev-203721:us-central1:morrisdev
    spec:
      serviceAccountName: 682935653385-compute@developer.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 30
      containers:
        # Image is published by the GitHub-connector build; :latest shown for
        # manual replace. The trigger pins an immutable per-commit tag.
        - image: us-west1-docker.pkg.dev/morrisdev-203721/cloud-run-source-deploy/protectparking/parking:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: CORS_ORIGINS
              value: "*"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: protectparking-database-url
                  key: latest
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: protectparking-admin-token
                  key: latest
            - name: RESEND_FROM
              value: donotreply@protectparking.com
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: protectparking-resend-api-key
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
